server.port=8080

# URL del receiver - modificabile via env: TARGET_URL=http://...
target.url=${TARGET_URL:http://localhost:9090/headers}

# Wire log Apache HttpClient 5: mostra i byte raw in uscita DOPO che OneAgent ha iniettato gli header
# Formato output: >> "traceparent: 00-<traceid>-<spanid>-01[\r][\n]"
logging.level.org.apache.hc.client5.http.wire=DEBUG

# Riduce il rumore di Spring
logging.level.root=WARN
logging.level.lab.dynatrace=INFO
logging.level.org.springframework.web=WARN
